{% extends "base.html" %}

{% block title %}Verify OTP | MediCurance{% endblock %}

{% block content %}
<div class="hero-shell animate-in" style="max-width: 560px; margin: 0 auto;">
    <div class="panel-hero">
        <div>
            <span class="hero-topline"><i class="fa-solid fa-shield-halved"></i> Authentication</span>
            <h1>Verify your OTP</h1>
            <p class="muted">We sent a 6-digit verification code to <strong>+91 {{ mobile }}</strong></p>
        </div>
    </div>

    <div class="card">
        <form action="{{ url_for('auth.verify_otp_route') }}" method="POST" id="otpForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="mobile" value="{{ mobile }}">

            <div class="form-group">
                <label class="form-label" style="text-align:center;">Enter 6-digit code</label>
                <input type="text" name="otp" id="otp" class="form-control" placeholder="000000" required pattern="[0-9]{6}"
                    maxlength="6" style="text-align:center; font-size:1.8rem; letter-spacing:0.6rem; font-weight:700;">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;" id="verifyBtn">
                Verify and authenticate
            </button>
        </form>

        <div style="margin-top:1.5rem; text-align:center;">
            <p class="muted">Didn't receive the code?</p>
            <p id="timerDisplay" class="muted"></p>
            <button onclick="resendOTP()" id="resendBtn" class="btn btn-secondary btn-sm" style="display:none;">
                <i class="fa-solid fa-redo"></i> Resend OTP
            </button>
            <div style="margin-top:1rem;">
                <a href="{{ url_for('auth.login') }}" class="muted"><i class="fa-solid fa-arrow-left"></i> Change number</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('otp')?.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        if (this.value.length === 6) {
            document.getElementById('otpForm').submit();
        }
    });

    function resendOTP() {
        const btn = document.getElementById('resendBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
        btn.disabled = true;

        const formData = new FormData();
        formData.append('mobile', '{{ mobile }}');

        fetch("{{ url_for('auth.send_otp_route') }}", {
            method: 'POST',
            body: formData
        }).then(response => {
            if (response.ok) {
                alert('A new OTP has been sent.');
                location.reload();
            } else {
                alert('Failed to resend OTP. Please try again.');
                btn.innerHTML = '<i class="fa-solid fa-redo"></i> Resend OTP';
                btn.disabled = false;
            }
        });
    }

    let timeLeft = 60;
    const timerDisplay = document.getElementById('timerDisplay');
    const resendBtn = document.getElementById('resendBtn');

    const timer = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timer);
            timerDisplay.innerHTML = 'You can now request a new code.';
            resendBtn.style.display = 'inline-flex';
        } else {
            timerDisplay.innerHTML = `<i class="fa-solid fa-clock"></i> Resend available in ${timeLeft}s`;
            timeLeft--;
        }
    }, 1000);
</script>
{% endblock %}
