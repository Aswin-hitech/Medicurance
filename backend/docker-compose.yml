services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      GUNICORN_BIND: 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./memory:/app/memory

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - ./uploads:/app/uploads:ro

volumes:
  mongo_data:
