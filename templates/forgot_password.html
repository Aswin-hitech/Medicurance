{% extends "base.html" %}

{% block title %}Account Recovery | MediCurance{% endblock %}

{% block content %}
<div class="hero-shell animate-in" style="max-width: 560px; margin: 0 auto;">
    <div class="panel-hero">
        <div>
            <span class="hero-topline"><i class="fa-solid fa-key"></i> Recovery</span>
            <h1>Reset your password</h1>
            <p class="muted">Enter your registered mobile number and we will send a secure recovery code.</p>
        </div>
    </div>

    <div class="card">
        <form action="{{ url_for('auth.reset_otp_request') }}" method="POST" id="forgotPasswordForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="text" name="mobile" id="mobile" class="form-control" placeholder="10-digit mobile number"
                    required pattern="[0-9]{10}" maxlength="10">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;" id="sendOtpBtn">
                <i class="fa-solid fa-paper-plane"></i> Send recovery code
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('auth.login') }}" class="muted"><i class="fa-solid fa-arrow-left"></i> Back to login</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotPasswordForm')?.addEventListener('submit', function () {
        const btn = document.getElementById('sendOtpBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.style.opacity = '0.8';
        btn.style.pointerEvents = 'none';
    });
</script>
{% endblock %}
