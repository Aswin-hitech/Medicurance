{% extends "base.html" %}

{% block title %}Account Recovery | MediCurance{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 4rem auto;">
    <div class="card-header" style="text-align: center;">
        <i class="fas fa-key-skeleton" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
        <h2>Reset Your Password</h2>
        <p class="text-muted">Enter your registered mobile number to receive a secure recovery code.</p>
    </div>

    <form action="{{ url_for('auth.reset_otp_request') }}" method="POST" id="forgotPasswordForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label">Mobile Number</label>
            <input type="text" name="mobile" id="mobile" class="form-control" placeholder="10-digit mobile number"
                required pattern="[0-9]{10}" maxlength="10">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;" id="sendOtpBtn">
            <i class="fas fa-paper-plane"></i> Send Recovery Code
        </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none;">
            <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i> Back to Secure Login
        </a>
    </div>
</div>

<script>
    document.getElementById('forgotPasswordForm')?.addEventListener('submit', function (e) {
        const btn = document.getElementById('sendOtpBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        btn.style.opacity = '0.7';
        btn.style.pointerEvents = 'none';
    });
</script>
{% endblock %}
