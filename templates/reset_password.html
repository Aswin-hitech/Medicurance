{% extends "base.html" %}

{% block title %}Set New Password | MediCurance{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 3rem auto;">
    <div class="card-header" style="text-align: center;">
        <div
            style="width: 70px; height: 70px; border-radius: 50%; background: var(--bg-alt); margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-lock-open" style="font-size: 2rem; color: var(--primary-color);"></i>
        </div>
        <h2>Create New Password</h2>
        <p class="text-muted">Verification code sent to <strong>{{mobile}}</strong></p>
    </div>

    <form action="{{ url_for('auth.reset_password_submit') }}" method="POST" id="resetPasswordForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="mobile" value="{{mobile}}">

        <div class="form-group">
            <label class="form-label">Recovery Code (OTP)</label>
            <input type="text" name="otp" class="form-control" placeholder="Enter 6-digit code" required
                pattern="[0-9]{6}" maxlength="6" style="text-align: center; font-size: 1.2rem; letter-spacing: 0.5rem;">
        </div>

        <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" name="password" id="password" class="form-control"
                placeholder="Choose a strong password" required minlength="8">
            <div style="margin-top: 0.8rem;">
                <div style="height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden;">
                    <div id="strengthBar"
                        style="height: 100%; width: 0; background: var(--danger-color); transition: all 0.4s ease;">
                    </div>
                </div>
                <small id="strengthText" class="text-muted" style="display: block; margin-top: 0.4rem;">Use 8+ characters with uppercase, lowercase, number, and special character.</small>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                placeholder="Repeat password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;" id="resetBtn">
            <i class="fas fa-save"></i> Update Password
        </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none;">
            Cancel and Return to Login
        </a>
    </div>
</div>

<script>
    document.getElementById('password')?.addEventListener('input', function (e) {
        const password = this.value;
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.match(/[a-z]+/)) strength += 25;
        if (password.match(/[A-Z]+/)) strength += 25;
        if (password.match(/[0-9]+/)) strength += 25;
        if (password.match(/[^a-zA-Z0-9]+/)) strength += 25;

        strengthBar.style.width = Math.min(strength, 100) + '%';

        if (strength <= 25) {
            strengthBar.style.background = 'var(--danger-color)';
            strengthText.innerText = 'Weak - add letters/numbers';
        } else if (strength <= 75) {
            strengthBar.style.background = 'var(--warning-color)';
            strengthText.innerText = 'Better - add mixed case';
        } else {
            strengthBar.style.background = 'var(--success-color)';
            strengthText.innerText = 'Strong password!';
        }
    });

    document.getElementById('resetPasswordForm')?.addEventListener('submit', function (e) {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            e.preventDefault();
            alert('Passwords do not match');
            return;
        }
        if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(password)) {
            e.preventDefault();
            alert('Password must include uppercase, lowercase, number, and special character.');
            return;
        }

        const btn = document.getElementById('resetBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;
    });
</script>
{% endblock %}
