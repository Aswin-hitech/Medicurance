{% extends "base.html" %}

{% block title %}Verify Identity | MediCurance{% endblock %}

{% block content %}
<div class="hero-shell animate-in" style="max-width: 760px; margin: 0 auto;">
    <div class="panel-hero">
        <div>
            <span class="hero-topline"><i class="fa-solid fa-id-card"></i> Identity verification</span>
            <h1>Confirm your government employee record</h1>
            <p class="muted">We couldn't match your mobile number directly, so please verify your official details to continue.</p>
        </div>
    </div>

    <div class="card">
        <form action="{{ url_for('auth.verify_identity_submit') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="mobile" value="{{ mobile }}">

            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
                <div class="form-group">
                    <label class="form-label">Aadhaar Number</label>
                    <input type="text" name="aadhaar_number" class="form-control" required maxlength="12" pattern="[0-9]{12}" placeholder="Enter 12-digit Aadhaar number">
                </div>
                <div class="form-group">
                    <label class="form-label">PPO Number</label>
                    <input type="text" name="ppo_number" class="form-control" required placeholder="Enter PPO number">
                </div>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-control" required placeholder="Enter full name as per records">
                </div>
                <div class="form-group">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control" required placeholder="Department">
                </div>
            </div>

            <div class="toolbar" style="margin-top:1.5rem; justify-content:space-between;">
                <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Verify identity</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
