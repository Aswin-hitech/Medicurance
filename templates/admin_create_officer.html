{% extends "base.html" %}

{% block title %}Create Officer | MediCurance{% endblock %}

{% block content %}
<div class="card animate-in" style="max-width:520px; margin:2rem auto;">
    <div class="card-header">
        <div class="chip"><i class="fa-solid fa-user-shield"></i> Officer account</div>
        <h1 style="margin-top:0.75rem;">Register officer</h1>
    </div>
    <form action="{{ url_for('admin.create_officer_submit') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label">Officer ID</label>
            <input type="text" name="officer_id" class="form-control" placeholder="e.g. OFF001" required>
        </div>
        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone_number" class="form-control" pattern="[0-9]{10}" maxlength="10" placeholder="10-digit phone number" required>
        </div>
        <div class="form-group">
            <label class="form-label">Official Email</label>
            <input type="email" name="email" class="form-control" placeholder="arun@gov.in" required>
        </div>
        <div class="form-group">
            <label class="form-label">Joining Date</label>
            <input type="date" name="joining_date" class="form-control">
        </div>
        <div class="form-group">
            <label class="form-label">Temporary password</label>
            <input type="password" name="password" class="form-control" minlength="8" required>
            <small class="text-muted">Use uppercase, lowercase, number, and special character.</small>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create account</button>
    </form>
</div>
{% endblock %}
